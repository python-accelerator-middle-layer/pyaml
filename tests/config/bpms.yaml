type: pyaml.accelerator
facility: ESRF
machine: sr
energy: 6e9
simulators:
  - type: pyaml.lattice.simulator
    lattice: sr/lattices/ebs.mat
    name: design
controls:
  - type: tango.pyaml.controlsystem
    tango_host: ebs-simu-3:10000
    name: live
    catalog: bpm-catalog
catalogs:
  - catalogs/bpms_catalogs.yaml
data_folder: /data/store
devices:
- type: pyaml.bpm.bpm
  name: BPM_C01-01
  model:
    type: pyaml.bpm.bpm_tiltoffset_model
    x_pos: BPM_C01-01/x
    y_pos: BPM_C01-01/y
    x_offset: BPM_C01-01/x_offset
    y_offset: BPM_C01-01/y_offset
    tilt: BPM_C01-01/tilt
- type: pyaml.bpm.bpm
  name: BPM_C01-02
  model:
    type: pyaml.bpm.bpm_simple_model
    x_pos: BPM_C01-02/x
    y_pos: BPM_C01-02/y
- type: pyaml.bpm.bpm
  name: BPM_C01-03
  model:
    type: pyaml.bpm.bpm_simple_model
    x_pos: BPM_C01-03/x
    y_pos: BPM_C01-03/y
- type: pyaml.bpm.bpm
  name: BPM_C01-04
  model:
    type: pyaml.bpm.bpm_simple_model
    x_pos_index: 0
    y_pos_index: 1
    x_pos: BPM_C01-04/x
    y_pos: BPM_C01-04/y
- type: pyaml.magnet.cfm_magnet
  name: SH1A-C01         #Name of the element in the lattice model
  mapping:
    # Multipole mapping for usage in families, in this example SH1-C01A-H is not
    # a lattice element present in the model, it is just a name to use in
    # PyAML families. When this 'virutal' element is set, it then applies
    # the corresponding multipole on the parent element.
    - [B0, SH1A-C01-H]
    - [A0, SH1A-C01-V]
    - [A1, SH1A-C01-SQ]
  model: sr/magnet_models/SH1AC01.yaml
