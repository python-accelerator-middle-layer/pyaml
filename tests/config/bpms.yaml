class_path: pyaml.accelerator.Accelerator
facility: ESRF
machine: sr
energy: 6e9
simulators:
- class_path: pyaml.lattice.simulator.Simulator
  lattice: sr/lattices/ebs.mat
  name: design
controls:
- class_path: tango.pyaml.controlsystem.TangoControlSystem
  tango_host: ebs-simu-3:10000
  name: live
data_folder: /data/store
devices:
- class_path: pyaml.bpm.bpm.BPM
  name: BPM_C01-01
  model:
    class_path: pyaml.bpm.bpm_tiltoffset_model.BPMTiltOffsetModel
    x_pos:
      class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
      attribute: srdiag/bpm/c01-01/SA_HPosition
      unit: mm
    y_pos:
      class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
      attribute: srdiag/bpm/c01-01/SA_VPosition
      unit: mm
    x_offset:
      class_path: tango.pyaml.attribute.Attribute
      attribute: srdiag/bpm/c01-01/HOffset
      unit: mm
    y_offset:
      class_path: tango.pyaml.attribute.Attribute
      attribute: srdiag/bpm/c01-01/VOffset
      unit: mm
    tilt:
      class_path: tango.pyaml.attribute.Attribute
      attribute: srdiag/bpm/c01-01/Tilt_Angle
      unit: rad
- class_path: pyaml.bpm.bpm.BPM
  name: BPM_C01-02
  model:
    class_path: pyaml.bpm.bpm_simple_model.BPMSimpleModel
    x_pos:
      class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
      attribute: srdiag/bpm/c01-02/SA_HPosition
      unit: mm
    y_pos:
      class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
      attribute: srdiag/bpm/c01-02/SA_VPosition
      unit: mm
- class_path: pyaml.bpm.bpm.BPM
  name: BPM_C01-03
  model:
    class_path: pyaml.bpm.bpm_simple_model.BPMSimpleModel
    x_pos:
      class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
      attribute: srdiag/bpm/c01-03/SA_HPosition
      unit: mm
    y_pos:
      class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
      attribute: srdiag/bpm/c01-03/SA_VPosition
      unit: mm
- class_path: pyaml.bpm.bpm.BPM
  name: BPM_C01-04
  model:
    class_path: pyaml.bpm.bpm_simple_model.BPMSimpleModel
    x_pos_index: 0
    y_pos_index: 1
    x_pos:
      class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
      attribute: srdiag/bpm/c01-04/Position
      unit: mm
    y_pos:
      class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
      attribute: srdiag/bpm/c01-04/Position
      unit: mm
- class_path: pyaml.magnet.cfm_magnet.CombinedFunctionMagnet
  name: SH1A-C01
  mapping:
  - - B0
    - SH1A-C01-H
  - - A0
    - SH1A-C01-V
  - - A1
    - SH1A-C01-SQ
  model: sr/magnet_models/SH1AC01.yaml
