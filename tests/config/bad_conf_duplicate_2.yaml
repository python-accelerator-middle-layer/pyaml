class_path: pyaml.accelerator.Accelerator
facility: ESRF
machine: sr
energy: 6e9
simulators:
- class_path: pyaml.lattice.simulator.Simulator
  lattice: sr/lattices/ebs.mat
  name: design
controls:
- class_path: tango.pyaml.controlsystem.TangoControlSystem
  tango_host: ebs-simu-3:10000
  name: live
data_folder: /data/store
arrays:
- class_path: pyaml.arrays.bpm.BPM
  name: BPM
  elements:
  - BPM_C04-04
  - BPM_C04-05
  - BPM_C04-06
  - BPM_C04-06
devices:
- class_path: pyaml.bpm.bpm.BPM
  name: BPM_C04-04
  model:
    class_path: pyaml.bpm.bpm_simple_model.BPMSimpleModel
    x_pos:
      class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
      attribute: srdiag/bpm/c04-04/SA_HPosition
      unit: m
    y_pos:
      class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
      attribute: srdiag/bpm/c04-04/SA_VPosition
      unit: m
- class_path: pyaml.bpm.bpm.BPM
  name: BPM_C04-05
  model:
    class_path: pyaml.bpm.bpm_simple_model.BPMSimpleModel
    x_pos:
      class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
      attribute: srdiag/bpm/c04-05/SA_HPosition
      unit: m
    y_pos:
      class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
      attribute: srdiag/bpm/c04-05/SA_VPosition
      unit: m
- class_path: pyaml.bpm.bpm.BPM
  name: BPM_C04-06
  model:
    class_path: pyaml.bpm.bpm_simple_model.BPMSimpleModel
    x_pos:
      class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
      attribute: srdiag/bpm/c04-06/SA_HPosition
      unit: m
    y_pos:
      class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
      attribute: srdiag/bpm/c04-06/SA_VPosition
      unit: m
