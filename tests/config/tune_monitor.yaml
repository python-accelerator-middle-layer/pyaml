class_path: pyaml.accelerator.Accelerator
facility: ESRF
machine: sr
harmonic_number: 992
energy: 6e9
simulators:
- class_path: pyaml.lattice.simulator.Simulator
  lattice: sr/lattices/ebs.mat
  name: design
controls:
- class_path: tango.pyaml.controlsystem.TangoControlSystem
  tango_host: ebs-simu-3:10000
  name: live
data_folder: /data/store
devices:
- class_path: pyaml.diagnostics.tune_monitor.BetatronTuneMonitor
  name: BETATRON_TUNE
  tune_h:
    class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
    attribute: srdiag/beam-tune/main/Qh
    unit: mm
  tune_v:
    class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
    attribute: srdiag/beam-tune/main/Qv
    unit: mm
  rf_plant_name: RF
- class_path: pyaml.rf.rf_plant.RFPlant
  name: RF
  masterclock:
    class_path: tango.pyaml.attribute.Attribute
    attribute: sy/ms/1/Frequency
    unit: Hz
