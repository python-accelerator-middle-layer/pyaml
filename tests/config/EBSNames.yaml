class_path: pyaml.accelerator.Accelerator
facility: ESRF
machine: sr
energy: 6e9
simulators:
- class_path: pyaml.lattice.simulator.Simulator
  lattice: sr/lattices/ebs-original-names.mat
  name: design
controls:
- class_path: tango.pyaml.controlsystem.TangoControlSystem
  tango_host: ebs-simu-3:10000
  name: live
data_folder: /data/store
devices:
- class_path: pyaml.magnet.quadrupole.Quadrupole
  name: QF1E
  model:
    class_path: pyaml.magnet.linear_model.LinearMagnetModel
    calibration_factor: 1.00054
    crosstalk: 1.0
    curve:
      class_path: pyaml.configuration.csvcurve.CSVCurve
      file: sr/magnet_models/QF1_strength.csv
    unit: 1/m
    powerconverter:
      class_path: tango.pyaml.attribute.Attribute
      attribute: srmag/vps-qf1/c04-e/current
      unit: A
- class_path: pyaml.magnet.quadrupole.Quadrupole
  name: QF1E-ALL
  lattice_names: list(QF1E,QF1I)
  model:
    class_path: pyaml.magnet.linear_model.LinearMagnetModel
    calibration_factor: 1.00054
    crosstalk: 1.0
    curve:
      class_path: pyaml.configuration.csvcurve.CSVCurve
      file: sr/magnet_models/QF1_strength.csv
    unit: 1/m
    powerconverter:
      class_path: tango.pyaml.attribute.Attribute
      attribute: srmag/vps-qf1/c04-e/current
      unit: A
- class_path: pyaml.magnet.quadrupole.Quadrupole
  name: QF1E-C05
  lattice_names: QF1E@1
