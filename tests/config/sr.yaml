class_path: pyaml.accelerator.Accelerator
facility: ESRF
machine: sr
energy: 6e9
simulators:
- class_path: pyaml.lattice.simulator.Simulator
  lattice: sr/lattices/ebs.mat
  name: design
controls:
- class_path: tango.pyaml.controlsystem.TangoControlSystem
  tango_host: ebs-simu-3:10000
  name: live
data_folder: /data/store
arrays:
- class_path: pyaml.arrays.magnet.Magnet
  name: HCORR
  elements:
  - SH1A-C0?-H
- class_path: pyaml.arrays.magnet.Magnet
  name: VCORR
  elements:
  - SH1A-C0?-V
- class_path: pyaml.arrays.magnet.Magnet
  name: HVCORR
  elements:
  - re:^SH1A-C0[12]-H$
  - re:^SH1A-C0[12]-V$
- class_path: pyaml.arrays.cfm_magnet.CombinedFunctionMagnet
  name: CFM
  elements:
  - SH1A-C0?
- class_path: pyaml.arrays.bpm.BPM
  name: BPMS
  elements:
  - BPM_C04-*
- class_path: pyaml.arrays.element.Element
  name: ElArray
  elements:
  - re:^BPM_C04-0[12]$
  - SH1A-C01-V
  - SH1A-C02-H
devices:
- sr/quadrupoles/QF1AC01.yaml
- sr/correctors/SH1AC01-C02.yaml
- class_path: pyaml.bpm.bpm.BPM
  name: BPM_C04-01
  model:
    class_path: pyaml.bpm.bpm_simple_model.BPMSimpleModel
    x_pos:
      class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
      attribute: srdiag/bpm/c04-01/SA_HPosition
      unit: m
    y_pos:
      class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
      attribute: srdiag/bpm/c04-01/SA_VPosition
      unit: m
- class_path: pyaml.bpm.bpm.BPM
  name: BPM_C04-02
  model:
    class_path: pyaml.bpm.bpm_simple_model.BPMSimpleModel
    x_pos:
      class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
      attribute: srdiag/bpm/c04-02/SA_HPosition
      unit: m
    y_pos:
      class_path: tango.pyaml.attribute_read_only.AttributeReadOnly
      attribute: srdiag/bpm/c04-02/SA_VPosition
      unit: m
